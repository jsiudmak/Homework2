    <!DOCTYPE html>
<!--
  Program name: Medical Form
Author: Julian C Siudmak
Date Created: 2/20/2026
Date Last edited: 3/11/2026
Version: 1.0
Description: This is a medical form for a ficional doctors office that will take patients personal and medical information.
-->


  
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Medical Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>

        <table width="100%">
            <tr>
                <td valign="top" align="left" width="20%">
                <div class="image">
                <img src="logo-header.svg" alt="sable bioclinic">
                </div>
                </td>
                <td>
                    
                </td>
                <td valign="bottom" align="right" width="20%">
                <p>Today's Date: <span id="today"></span></p>
                </td>
                </tr>
        </table>
    </header>

<hr>
  <h1>New Patient Registration</h1>
    <p id="datetime" align="left"></p>
    
  <p>Fields marked with * are required</p>

  <form action=thankyou.html>
    <center>
        <div class="format">
<div>
            <table>
<tr>
    <th colspan="4">Account Setup</th>
</tr>
                
   
    
      <tr>
    <td class="td1"><label for="uid">User ID:</label></td>
                    <td>
                        <input
                        type="text"
                        name="uid"
                        id="uid"
                        maxlength="20"
                        required
                        title="Please enter a user ID:"
                        placeholder="Desired User ID"
                        />
                    </td>
            
                
    <td class="td1">
        <label for="email">Email Address:</label></td>
    <td>
      <input
        type="text"
        name="email"
        id="email"
        required
        pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,20}$"
        onblur="validateEmail()"
        placeholder="Email Address"/>
        <span class="error" id="email-error"></span>
</tr>

                <tr>
                    <td class="td1">
                        <label for="password"> Password </label>
                    </td>
                    <td>
                        <input type="password" id="password" required onkeyup="checkPasswordMatch();">
                    </td>

                    
                
                    <td class="td1">
                        <label for="password"> Re-enter Password </label>
                    </td>
                    <td>
                        <input type="password" id="confirm_password" required onkeyup="checkPasswordMatch();">
                    </td>
                </tr>

<tr>
    <th colspan="4">Demographics and Contact</th>
</tr>

        <tr>
            <td>
                <label for="fname">First Name:</label></td>
            <td>
                  <input
                    type="text"
                    name="fname"
                    id="fname"
                    minlength="1"
                    maxlength="30"
                    required
                    title="Letter, apostrophes, and dashes only"
                    pattern="[a-zA-Z']{1,30}"
                    onblur="validateFname()"
                    placeholder="First Name"/>
                    <span class="error" id="fname-error"></span>
            
        
            <td>
                <label for="fname">Middle Inital:</label></td>
            <td>
              <input
                type="text"
                name="mname"
                id="mname"
                minlength="1"
                maxlength="1"
                title="Letter, apostrophes, and dashes only"
                pattern="[a-zA-Z']{1,30}"
                onblur="validateFname()"
                placeholder="Middle Intial"/>
                <span class="error" id="mname-error"></span>
        </tr>

        <tr>
    <td>
        <label for="lname">Last Name:</label></td>
    <td>
      <input
        type="text"
        name="lname"
        id="lname"
        minlength="1"
        maxlength="30"
        required
        title="Letter, apostrophes, and dashes only"
        pattern="[a-zA-Z']{1,30}"
        onblur="validateLname()"
        placeholder="Last Name"/>
        <span class="error" id="lname-error"></span>

       

            <td>
                <label for="dob">Date of Birth:</label></td>
            <td>
                <input
                    type="date" 
                    id="dob" 
                    name="dob">
            </td>
        </tr>
		<tr>
				<td> <label for ="SSN">SSN:</td>
			<td>
				<input
   					 type="password"
    				minlength="9"
				    maxlength="11"
				    name="ssn"
				    id="ssn"
				    required
				    title="Numbers only"
				    placeholder="123-45-6789"
				    onblur="validateSsn()"
					/>
				<span class="error" id="ssn-error"></span>
			</td>

		    <td>
                <label for="phone">Phone Number:</label>
            </td>
            <td>
                <input type="text" 
                name="phone" 
                id="phone" 
                pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                required 
                title="Please enter phone number" 
                placeholder="123-456-7890"/>
            </td>
            </tr>

		<tr>
    		<td>
				<label for="address1">Address Line 1:</label>
			</td>
   			<td>
        	<input type="text" 
			        name="address1" 
			        id="address1" 
			        maxlength="30" 
			        required 
			        placeholder="123 Main st">
    		</td>
    		<td>
				<label for="address2">Address Line 2:</label>
			</td>
   			<td>
        	<input type="text" 
			        name="address2" 
			        id="address2" 
			        maxlength="30" 
			        placeholder="Apt 10A">
    		</td>
		</tr>


      <tr>
            <td><label for="pgender">Gender:</label></td>
            <td>
                <input type="radio" id="g1" name="pgender" value="Male"> Male
                <input type="radio" id="g2" name="pgender" value="Female"> Female
                <input type="radio" id="g3" name="pgender" value="Other"> Other
            </td>
        </tr>


				<th colspan="4">Enhacement intake and health information</th>

    </fieldset>
  </form>

			</table>

</div>

  <footer>
      <img src="logo-footer.svg" alt="sable bioclinic">
      <p class="address">123 Mulberry St.<br>Houston, TX 77070</p>
      <p>Connect with us</p>
        <a href="https://www.instagram.com/hire_bauer/?hl=en">Instagram</a>
  
  
  
  </footer>

</body>
    <script>
        var dt = new Date();
        document.getElementById("datetime").innerHTML = dt;
    </script>
</html>
